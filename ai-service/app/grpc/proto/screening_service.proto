syntax = "proto3";

package screening;

service ScreeningService {
  rpc ScreenCandidates(ScreenCandidatesRequest) returns (ScreenCandidatesResponse);
  rpc ExtractResume(ExtractResumeRequest) returns (ExtractResumeResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message SkillInput {
  string name = 1;
  int32 weight = 2;
  bool required = 3;
}

message EducationReqInput {
  string level = 1;
  string field = 2;
  bool required = 3;
}

message JobInput {
  string title = 1;
  string description = 2;
  repeated SkillInput required_skills = 3;
  string experience_level = 4;
  int32 min_experience_years = 5;
  int32 max_experience_years = 6;
  repeated EducationReqInput education_requirements = 7;
}

message CandidateSkill {
  string name = 1;
  string level = 2;
  float years_of_experience = 3;
}

message LanguageItem {
  string name = 1;
  string proficiency = 2;
}

message ExperienceItem {
  string company = 1;
  string role = 2;
  string start_date = 3;
  string end_date = 4;
  string description = 5;
  repeated string technologies = 6;
  bool is_current = 7;
}

message EducationItem {
  string institution = 1;
  string degree = 2;
  string field_of_study = 3;
  int32 start_year = 4;
  int32 end_year = 5;
}

message CertificationItem {
  string name = 1;
  string issuer = 2;
  string issue_date = 3;
}

message ProjectItem {
  string name = 1;
  string description = 2;
  repeated string technologies = 3;
  string role = 4;
  string link = 5;
  string start_date = 6;
  string end_date = 7;
}

message AvailabilityItem {
  string status = 1;
  string type = 2;
  string start_date = 3;
}

message SocialLinksItem {
  string linkedin = 1;
  string github = 2;
  string portfolio = 3;
}

message CandidateInput {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string headline = 5;
  string bio = 6;
  string location = 7;
  repeated CandidateSkill skills = 8;
  repeated LanguageItem languages = 9;
  repeated ExperienceItem experience = 10;
  repeated EducationItem education = 11;
  repeated CertificationItem certifications = 12;
  repeated ProjectItem projects = 13;
  AvailabilityItem availability = 14;
  SocialLinksItem social_links = 15;
  float total_experience_years = 16;
  string current_title = 17;
  string current_company = 18;
  string resume_text = 19;
}

message ScreeningWeights {
  float skills = 1;
  float experience = 2;
  float education = 3;
  float relevance = 4;
}

message ScreeningConfig {
  int32 shortlist_size = 1;
  ScreeningWeights weights = 2;
  string custom_instructions = 3;
}

message ScreenCandidatesRequest {
  JobInput job = 1;
  repeated CandidateInput candidates = 2;
  ScreeningConfig config = 3;
  string request_id = 4;
}

// --- Response ---

message DimensionAnalysis {
  string dimension = 1;
  int32 score = 2;
  string rationale = 3;
}

message RankedCandidate {
  string candidate_id = 1;
  int32 rank = 2;
  int32 overall_score = 3;
  int32 skills_score = 4;
  int32 experience_score = 5;
  int32 education_score = 6;
  int32 relevance_score = 7;
  repeated string strengths = 8;
  repeated string gaps = 9;
  repeated string risks = 10;
  string recommendation = 11;       // STRONG_YES, YES, MAYBE, NO
  string reasoning_summary = 12;
  repeated DimensionAnalysis dimension_analysis = 13;
}

message ScreeningMetadata {
  int32 total_evaluated = 1;
  int32 processing_time_ms = 2;
  string model = 3;
}

message ScreenCandidatesResponse {
  bool success = 1;
  repeated RankedCandidate results = 2;
  ScreeningMetadata metadata = 3;
  string error = 4;
}

message ExtractResumeRequest {
  string resume_text = 1;
  string request_id = 2;
}

message ExtractResumeResponse {
  bool success = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string headline = 5;
  string bio = 6;
  string location = 7;
  repeated CandidateSkill skills = 8;
  repeated LanguageItem languages = 9;
  repeated ExperienceItem experience = 10;
  repeated EducationItem education = 11;
  repeated CertificationItem certifications = 12;
  repeated ProjectItem projects = 13;
  AvailabilityItem availability = 14;
  SocialLinksItem social_links = 15;
  string phone = 16;
  float total_experience_years = 17;
  string current_title = 18;
  string current_company = 19;
  string error = 20;
}

message HealthCheckRequest {
  string service = 1;
  string request_id = 2;
}

message HealthCheckResponse {
  bool healthy = 1;
  string status = 2;
  string service = 3;
  string version = 4;
  string message = 5;
}
